services:
  kafka_lite:
    build:
      context: ../../
      dockerfile: projects/03_kafka_lite/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - KAFKA_LITE_BROKER_HOST=0.0.0.0
      - KAFKA_LITE_BROKER_PORT=8080
      - KAFKA_LITE_LOG_LEVEL=info
      - KAFKA_LITE_LOG_DIR=/data
